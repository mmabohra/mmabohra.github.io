<!doctype html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <title>Redirecting...</title>
    <script>
        // GitHub Pages SPA redirect trick.
        // Encodes the current path/query/hash into a query param and
        // redirects to the root, where index.html picks it up and restores it.
        var l = window.location;
        l.replace(
            l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
            l.pathname.split('/').slice(0, 1).join('/') +
            '/?p=' + encodeURIComponent(l.pathname + l.search) +
            (l.hash ? '&h=' + encodeURIComponent(l.hash) : '')
        );
    </script>
</head>

<body></body>

</html>
